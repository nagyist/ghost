<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ghost</title>
    <!-- Apache ECharts, loaded from a CDN and exposed as the global
         `window.echarts`. This is a classic (non-module) script, so it executes
         before the deferred React module below, making the global available by
         the time the chart components render. -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@6.1.0/dist/echarts.min.js"></script>
  </head>
  <body class="h-screen w-screen overflow-hidden bg-slate-50 text-slate-900">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
