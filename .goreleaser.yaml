# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

project_name: ghost

# Create VERSION file and generate completions before building
before:
  hooks:
    - sh -c 'echo "{{ .Tag }}" > latest.txt'
    - ./scripts/completions.sh

builds:
  - main: ./cmd/ghost
    binary: ghost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - '386'
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/timescale/ghost/internal/config.Version=v{{.Version}}
      - -X github.com/timescale/ghost/internal/config.BuildTime={{.Date}}
      - -X github.com/timescale/ghost/internal/config.GitCommit={{.Commit}}

archives:
  - id: archive
    formats: [tar.gz]

    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    files:
      - README.md
      - LICENSE
      - NOTICE
      - completions/*

# Linux package configuration (APT, RPM, etc.)
nfpms:
  - id: packages
    package_name: ghost
    vendor: Timescale, Inc., d/b/a Tiger Data
    maintainer: Tiger Data <support@tigerdata.com>
    homepage: https://ghost.build
    description: |-
      Ghost - A command-line interface for managing PostgreSQL databases.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    priority: extra
    file_name_template: "{{ .ConventionalFileName }}"
    contents:
      # Shell completions
      - src: ./completions/ghost.bash
        dst: /usr/share/bash-completion/completions/ghost
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: ./completions/ghost.fish
        dst: /usr/share/fish/vendor_completions.d/ghost.fish
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: ./completions/ghost.zsh
        dst: /usr/share/zsh/vendor-completions/_ghost
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
    rpm:
      group: Unspecified
    deb:
      lintian_overrides:
        - statically-linked-binary

# Homebrew cask published to https://github.com/timescale/homebrew-tap (Casks/ghost.rb).
# Using homebrew_casks (rather than the deprecated brews) is the GoReleaser-recommended path
# going forward. `brew install timescale/tap/ghost` still works as Homebrew auto-detects casks.
homebrew_casks:
  - name: ghost
    repository:
      owner: timescale
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://ghost.build
    description: |-
      Ghost - The first database designed for agents.
      Unlimited Postgres databases you can create, fork, and discard freely. Built for how agents actually work.
    binaries: [ ghost ]
    license: Apache-2.0
    # Skips prerelease builds
    skip_upload: auto
    # Download from the ghost-releases CDN (same URL the install script uses), not GitHub.
    url:
      template: "https://install.ghost.build/releases/{{ .Tag }}/{{ .ArtifactName }}"
    hooks:
      # TODO: Sign and notarize instead of removing the quarantine bit.
      # See: https://goreleaser.com/customization/homebrew_casks/#signing-and-notarizing
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ghost"]
          end
    # Shell completions (ship in the archive under completions/ via scripts/completions.sh)
    completions:
      bash: "completions/ghost.bash"
      zsh: "completions/ghost.zsh"
      fish: "completions/ghost.fish"
    # NOTE: There is a bug in GoReleaser when caveats contain normal multiline
    # strings, which causes the homebrew cask to only output the final line.
    # Formatting it in the following way works around it.
    caveats: >
      Ghost CLI has been installed successfully!\n\nGet started with:\n  ghost login\n  ghost mcp install\n\nFor help:\n  ghost help

dockers_v2:
  - id: docker
    images:
      - ghcr.io/timescale/ghost
    tags:
      - "{{ .Version }}"
      - '{{ if eq .Prerelease "" }}{{ .Major }}{{ end }}'
      - '{{ if eq .Prerelease "" }}{{ .Major }}.{{ .Minor }}{{ end }}'
      - '{{ if eq .Prerelease "" }}latest{{ end }}'
    labels:
      io.modelcontextprotocol.server.name: "io.github.timescale/ghost"
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.description: "A command-line interface for managing PostgreSQL databases"
      org.opencontainers.image.licenses: "Apache-2.0"
      org.opencontainers.image.name: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.source: "https://github.com/timescale/ghost"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.url: "https://ghost.build"
      org.opencontainers.image.vendor: "Timescale, Inc., d/b/a Tiger Data"
      org.opencontainers.image.version: "{{.Version}}"
    build_args:
      BINARY_SOURCE: release
    platforms:
      - linux/amd64
      - linux/arm64

# S3 Blob Storage Configuration
blobs:
  # Versioned release artifacts
  - provider: s3
    bucket: ghost-releases
    region: us-east-1
    directory: "releases/{{ .Tag }}"
    ids:
      - archive  # Archive ID
      - packages # nfpms package ID

  # Upload install script and latest version file to bucket root (skip for prereleases)
  - provider: s3
    bucket: ghost-releases
    region: us-east-1
    directory: "{{ \"\" }}" # Can't use an empty string directly or GoReleaser defaults to "{{ .ProjectName }}/{{ .Tag }}"
    extra_files_only: true
    disable: '{{ ne .Prerelease "" }}' # Skip this step for prereleases
    extra_files:
      - glob: ./latest.txt
        name_template: "latest.txt"
      - glob: ./scripts/install.sh
        name_template: "install.sh"
      - glob: ./scripts/install.ps1
        name_template: "install.ps1"

# Checksum configuration - split into individual files for easier validation
checksum:
  split: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^specs:"
      # TODO: Other files that should be ignored

# Publishers for external registries
publishers:
  # Upload all Linux packages (deb, rpm) to PackageCloud
  - name: packagecloud
    disable: '{{ ne .Prerelease "" }}' # Skip this step for prereleases
    ids:
      - packages # Only publish nfpms packages (Linux packages)
    cmd: >-
      package_cloud push --skip-errors timescale/ghost/{{-
        if contains .ArtifactPath ".deb" -}}
          any/any
        {{- else if contains .ArtifactPath ".rpm" -}}
          rpm_any/rpm_any
        {{- end }} {{ .ArtifactPath }}
    env:
      - PACKAGECLOUD_TOKEN={{ .Env.PACKAGECLOUD_TOKEN }}

# Release configuration
release:
  github:
    owner: timescale
    name: ghost
  # Overwrite existing assets so the workflow is re-runnable after a partial failure.
  mode: replace
  draft: false
  prerelease: auto
  name_template: "Release {{ .Tag }}"
