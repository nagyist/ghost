name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write
  packages: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install package_cloud gem
        run: sudo gem install package_cloud --no-doc

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Action-scoped GitHub token used for downloading code, etc.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AWS credentials for pushing to ghost-releases S3 bucket
          AWS_ACCESS_KEY_ID: ${{ secrets.GHOST_RELEASES_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GHOST_RELEASES_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          # PackageCloud credentials for publishing Linux packages
          PACKAGECLOUD_TOKEN: ${{ secrets.IO_PACKAGECLOUD_TOKEN }}
          # Cross-repo GitHub token for publishing the Homebrew cask to timescale/homebrew-tap.
          # NOTE: this token will need to be rotated once per year.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Invalidate CloudFront Cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GHOST_RELEASES_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GHOST_RELEASES_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/latest.txt" "/install.sh" "/install.ps1"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Publish npm packages
        run: |
          go run ./cmd/npm-publisher \
            --version "${{ steps.version.outputs.version }}" \
            --dist-dir ./dist
